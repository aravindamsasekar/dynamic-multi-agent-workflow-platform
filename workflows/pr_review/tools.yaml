tools:
  - name: github_get_pr
    description: Fetches pull request metadata including title, body, state, and author.
    input_schema:
      type: object
      properties:
        owner:
          type: string
          description: Repository owner or organization
        repo:
          type: string
          description: Repository name
        pull_number:
          type: integer
          description: Pull request number
      required: [owner, repo, pull_number]
    adapter_type: github
    adapter_config:
      operation: get_pull_request

  - name: github_get_files
    description: Lists files changed in the pull request with additions, deletions, and patch status.
    input_schema:
      type: object
      properties:
        owner:
          type: string
          description: Repository owner or organization
        repo:
          type: string
          description: Repository name
        pull_number:
          type: integer
          description: Pull request number
      required: [owner, repo, pull_number]
    adapter_type: github
    adapter_config:
      operation: get_changed_files

  - name: github_get_diff
    description: Returns the raw unified diff (patch) for all changed files in the pull request.
    input_schema:
      type: object
      properties:
        owner:
          type: string
          description: Repository owner or organization
        repo:
          type: string
          description: Repository name
        pull_number:
          type: integer
          description: Pull request number
      required: [owner, repo, pull_number]
    adapter_type: github
    adapter_config:
      operation: get_diff

  - name: knowledge_search
    description: >
      Search the internal knowledge base for coding standards, architecture decisions,
      security guidelines, and review guidelines relevant to the code being reviewed.
      Use this before writing the final review to retrieve applicable standards.
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Natural-language description of what you are looking for
      required: [query]
    adapter_type: knowledge
    adapter_config:
      collections:
        - coding-standards
        - architecture
      top_k: 5

  - name: mcp_get_pr_comments
    description: >
      Retrieves existing review comments and review threads on a pull request via GitHub MCP.
      Use this to read prior reviewer feedback and avoid duplicating comments already addressed.
    input_schema:
      type: object
      properties:
        owner:
          type: string
          description: Repository owner or organization
        repo:
          type: string
          description: Repository name
        pull_number:
          type: integer
          description: Pull request number
      required: [owner, repo, pull_number]
    adapter_type: mcp
    adapter_config:
      server_command: npx
      server_args:
        - "-y"
        - "@modelcontextprotocol/server-github"
      tool_name: list_pull_request_review_comments
