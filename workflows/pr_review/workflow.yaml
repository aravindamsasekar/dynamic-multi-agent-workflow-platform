workflow_id: pr_review
name: PR Review (Production)
description: >
  Multi-agent pull request review combining GitHub data collection, knowledge-grounded
  code quality and risk assessment, and a final synthesis into a structured review report.
pattern: parallel_specialist
agent_ids:
  - pr_data_agent
  - review_specialist
  - risk_specialist
pattern_config:
  strategy: concatenate
  reviewer_agent_id: synthesis_agent
hitl_enabled: false
